<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElasticoArts - Area</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* ==================== ANIMATED BACKGROUND ==================== */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .loading-screen,
        .login-container,
        .app {
            position: relative;
            z-index: 1;
        }

        /* ==================== LOADING SCREEN ==================== */
        .loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            overflow: hidden;
        }

        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loading-gif-bg {
            width: 425px;
            height: 425px;
            border-radius: 0;
            object-fit: cover;
            object-position: center;
            position: relative;
            z-index: 2;
            box-shadow: none;
        }

        .loading-overlay { display: none; }

        .loader-container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeInUp 0.6s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        .loading-text {
            font-size: 1.6rem;
            letter-spacing: 6px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1.2rem;
        }

        .loading-dots span {
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; background: linear-gradient(135deg, #00b09b, #96c93d); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== LOGIN SCREEN ==================== */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-container.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .login-box {
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 3rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(106, 17, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        .login-logo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
            position: absolute;
            top: 0;
            left: 0;
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .checkmark-wrapper {
            width: 100px;
            height: 100px;
            position: absolute;
            top: 0;
            left: 0;
            transform: scale(0) rotate(-180deg);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .checkmark-wrapper.active {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        .checkmark-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 176, 155, 0.5);
        }

        .checkmark {
            width: 50px;
            height: 50px;
            stroke: white;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            animation: drawCheck 0.5s ease-out forwards;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        .login-logo.rotate {
            animation: logoRotate 0.5s ease-in-out forwards;
        }

        @keyframes logoRotate {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.8); opacity: 0.5; }
            100% { transform: rotate(360deg) scale(0); opacity: 0; }
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
        }

        .login-box input {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .login-box input:focus {
            border-color: #6a11ff;
            transform: scale(1.02);
        }

        .login-box button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(106, 17, 255, 0.3);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            color: white;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .music-btn.playing {
            background: rgba(106, 17, 255, 0.2);
            border-color: rgba(106, 17, 255, 0.4);
            animation: musicPulse 2s ease-in-out infinite;
        }

        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(106,17,255,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(106,17,255,0); }
        }

        /* ==================== MAIN APP ==================== */
        .app {
            min-height: 100vh;
            animation: fadeIn 0.5s ease;
            display: flex;
            flex-direction: column;
        }

        .app.hidden { display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header {
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(106, 17, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            object-fit: cover;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            padding: 2px;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .instagram-link {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .instagram-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(253, 29, 29, 0.4);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .storage-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-family: monospace;
            border: 1px solid rgba(106, 17, 255, 0.3);
        }

        .folders-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }

        .folder-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(106, 17, 255, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .folder-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6a11ff, #2575fc, #00b09b);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .folder-card:hover::before { transform: translateX(0); }

        .folder-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(106, 17, 255, 0.5);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .folder-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .folder-name { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
        .folder-count { font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); }

        .insta-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid rgba(131, 58, 180, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .insta-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045);
        }

        .insta-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }

        .insta-count {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            min-height: 2.8rem;
        }

        .insta-username { font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); }
        .insta-icon { font-size: 2rem; }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            color: #00e676;
            margin-top: 0.2rem;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: #00e676;
            border-radius: 50%;
            animation: livePulse 1.5s infinite;
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
        }

        .photo-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .photo-item:hover {
            transform: scale(1.03);
            border-color: rgba(106, 17, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .photo-item img.loaded {
            opacity: 1;
        }

        .photo-item {
            position: relative;
        }

        .like-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            z-index: 10;
            opacity: 0;
            transform: scale(0.8);
        }

        .photo-item:hover .like-btn {
            opacity: 1;
            transform: scale(1);
        }

        .like-btn.liked {
            background: rgba(255, 59, 92, 0.3);
            border: 1px solid rgba(255, 59, 92, 0.5);
            opacity: 1;
            transform: scale(1);
        }

        .like-btn:hover {
            transform: scale(1.15) !important;
        }

        .like-count {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            opacity: 0;
            transition: all 0.2s;
        }

        .photo-item:hover .like-count,
        .photo-item .like-count.has-likes {
            opacity: 1;
        }

        @keyframes likePopup {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        .like-btn.pop {
            animation: likePopup 0.3s ease;
        }

        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox.active { display: flex; }

        .slider-container {
            position: relative;
            width: 90%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-image { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 1rem; }

        .nav-btn {
            position: absolute;
            background: rgba(106, 17, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 2rem;
            width: 3rem; height: 3rem;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .nav-btn:hover { background: rgba(106, 17, 255, 0.6); transform: scale(1.05); }
        .prev-btn { left: -4rem; }
        .next-btn { right: -4rem; }

        .close-lightbox {
            position: absolute;
            top: 1rem; right: 2rem;
            background: rgba(106, 17, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 2.5rem; height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .download-btn {
            position: absolute;
            top: 1rem; right: 5rem;
            background: rgba(0, 176, 155, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 2.5rem; height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: rgba(0, 176, 155, 0.6);
            transform: scale(1.1);
        }

        .image-counter {
            position: absolute;
            bottom: -3rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            z-index: 4000;
            animation: fadeInOut 2s ease;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }

        .content-area {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
            padding-bottom: 5rem;
        }

        .footer {
            margin-top: auto;
            padding: 2rem;
            border-top: 1px solid rgba(106, 17, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.8rem;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 50;
            padding: 1rem 2rem;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .footer-logo {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            object-fit: cover;
            opacity: 0.6;
        }

        .footer-right {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .footer-link {
            color: rgba(255, 255, 255, 0.35);
            text-decoration: none;
            transition: color 0.2s;
            font-size: 0.8rem;
        }

        .footer-link:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-divider {
            width: 1px;
            height: 12px;
            background: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 768px) {
            .footer {
                flex-direction: row;
                justify-content: center;
                gap: 0.5rem;
                padding: 0.8rem 1rem;
                font-size: 0.7rem;
            }

            .footer-right { gap: 0.8rem; }
        }

        @media (max-width: 768px) {
            .prev-btn { left: 0.5rem; }
            .next-btn { right: 0.5rem; }
            .nav-btn { width: 2rem; height: 2rem; font-size: 1rem; }
            .brand { font-size: 1rem; }
            .logo-img { width: 35px; height: 35px; }

            .header {
                padding: 0.7rem 1rem;
                gap: 0.5rem;
            }

            .header-actions {
                gap: 0.5rem;
            }

            .storage-info {
                font-size: 0.65rem;
                padding: 0.3rem 0.7rem;
            }

            .instagram-link, .logout-btn {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }

            .folders-container {
                padding: 1rem;
            }

            .content-area {
                padding: 1rem;
            }

            .section-title {
                font-size: 1.4rem;
                margin-bottom: 1rem;
            }

            .folder-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.8rem;
            }

            .folder-card {
                padding: 1.2rem 0.8rem;
                border-radius: 1rem;
            }

            .folder-icon { font-size: 2rem; margin-bottom: 0.5rem; }
            .folder-name { font-size: 0.95rem; }
            .folder-count { font-size: 0.75rem; }

            .insta-card {
                padding: 1.2rem 0.8rem;
                border-radius: 1rem;
                gap: 0.25rem;
            }

            .insta-icon { font-size: 1.4rem; }
            .insta-label { font-size: 0.6rem; letter-spacing: 1px; }
            .insta-count { font-size: 1.6rem; min-height: 2rem; }
            .insta-username { font-size: 0.72rem; }
            .live-badge { font-size: 0.62rem; }

            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.7rem;
            }

            .loading-gif-bg {
                width: 260px;
                height: 260px;
            }

            .loading-text {
                font-size: 1.1rem;
                letter-spacing: 4px;
            }

            .login-box {
                padding: 2rem 1.5rem;
            }
        }

        @media (max-width: 400px) {
            .folder-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.6rem;
            }

            .folder-card, .insta-card {
                padding: 1rem 0.6rem;
            }

            .folder-name { font-size: 0.85rem; }
            .insta-count { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<!-- ANIMATED BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
    <div class="loader-container">
        <img class="loading-gif-bg" src="https://cdn.dribbble.com/userupload/21328517/file/original-48a84740f8b872ce4008dac8b769c6ce.gif" alt="" onerror="this.style.display='none'">
        <div class="loading-text">ELASTICO ARTS</div>
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>
</div>

<!-- LOGIN SCREEN -->
<div class="login-container" id="loginContainer">
    <div class="login-box">
        <audio id="bgMusic" loop>
            <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
        </audio>
        <div class="login-logo-wrapper">
            <div class="login-logo" id="loginLogo">
                <img src="https://i.imgur.com/NLWduK1.png" alt="ElasticoArts Logo">
            </div>
            <div class="checkmark-wrapper" id="checkmarkWrapper">
                <div class="checkmark-circle">
                    <svg class="checkmark" viewBox="0 0 52 52">
                        <path d="M14 27 L22 35 L38 17" stroke="white" stroke-width="4" fill="none"/>
                    </svg>
                </div>
            </div>
        </div>
        <h1>ElasticoArts Area</h1>
        <p>Exklusive Artworks</p>
        <input type="password" id="passwordInput" placeholder="Passwort">
        <button onclick="checkPassword()">Eintreten</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<!-- MAIN APP -->
<div class="app hidden" id="app">
    <div class="header">
        <div class="logo-area">
            <img class="logo-img" src="https://i.imgur.com/NLWduK1.png" alt="ElasticoArts Logo">
            <span class="brand">ElasticoArts Area</span>
        </div>
        <div class="header-actions">
            <a href="https://www.instagram.com/elasticoarts/" target="_blank" class="instagram-link">
                📷 Instagram
            </a>
            <div class="storage-info" id="storageInfo">📸 wird geladen...</div>
            <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Musik an/aus">🔊</button>
            <button class="logout-btn" onclick="logout()">Verlassen</button>
        </div>
    </div>
    <div class="content-area" id="contentArea"></div>
    <footer class="footer">
        <div class="footer-left">
            <img class="footer-logo" src="https://i.imgur.com/NLWduK1.png" alt="ElasticoArts">
            <span>© <span id="footerYear"></span> ElasticoArts — Alle Rechte vorbehalten</span>
        </div>
        <div class="footer-right">
            <a href="https://www.instagram.com/elasticoarts/" target="_blank" class="footer-link">📷 Instagram</a>
            <div class="footer-divider"></div>
            <span class="footer-link">Exklusive Artworks</span>
        </div>
    </footer>

<div class="lightbox" id="lightbox">
    <button class="close-lightbox" onclick="closeLightbox()">✕</button>
    <a class="download-btn" id="downloadBtn" title="Herunterladen" onclick="downloadImage()">⬇</a>
    <div class="slider-container">
        <button class="nav-btn prev-btn" onclick="prevImage()">❮</button>
        <img class="slider-image" id="sliderImage">
        <button class="nav-btn next-btn" onclick="nextImage()">❯</button>
    </div>
    <div class="image-counter" id="imageCounter"></div>
</div>

<script>
    // ==================== GEOMETRISCHER HINTERGRUND ====================
    (function() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const shapes = [];
        const COUNT = 18;
        const TYPES = [3, 4, 6]; // Dreieck, Viereck, Sechseck

        for (let i = 0; i < COUNT; i++) {
            shapes.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 80 + 40,
                sides: TYPES[Math.floor(Math.random() * TYPES.length)],
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.003,
                vx: (Math.random() - 0.5) * 0.25,
                vy: (Math.random() - 0.5) * 0.25,
                alpha: Math.random() * 0.15 + 0.08,
                color: Math.random() > 0.5 ? '106,17,255' : '37,117,252',
            });
        }

        function drawPolygon(ctx, x, y, size, sides, rotation) {
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                const angle = rotation + (i * Math.PI * 2) / sides;
                const px = x + Math.cos(angle) * size;
                const py = y + Math.sin(angle) * size;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            shapes.forEach(s => {
                s.x += s.vx;
                s.y += s.vy;
                s.rotation += s.rotSpeed;

                if (s.x < -100) s.x = canvas.width + 100;
                if (s.x > canvas.width + 100) s.x = -100;
                if (s.y < -100) s.y = canvas.height + 100;
                if (s.y > canvas.height + 100) s.y = -100;

                drawPolygon(ctx, s.x, s.y, s.size, s.sides, s.rotation);
                ctx.strokeStyle = `rgba(${s.color},${s.alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            });

            requestAnimationFrame(animate);
        }

        animate();
    })();

    // ==================== MUSIK ====================
    let musicPlaying = false;

    function startMusic() {
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        if (!audio) return;
        audio.volume = 0.10;
        audio.play().then(() => {
            if (btn) { btn.textContent = '🔊'; btn.classList.add('playing'); }
            musicPlaying = true;
        }).catch(() => {});
    }

    function toggleMusic() {
        const audio = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');
        if (musicPlaying) {
            audio.pause();
            btn.textContent = '🎵';
            btn.classList.remove('playing');
            musicPlaying = false;
        } else {
            audio.volume = 0.10;
            audio.play().then(() => {
                btn.textContent = '🔊';
                btn.classList.add('playing');
                musicPlaying = true;
            }).catch(() => {});
        }
    }

    function stopMusic() {
        const audio = document.getElementById('bgMusic');
        if (audio) {
            audio.pause();
            audio.currentTime = 0;
            musicPlaying = false;
        }
    }

    // ==================== PASSWORT ====================
    const CORRECT_PASSWORD = "amine";

    // ==================== GITHUB BILDER ====================
    const GITHUB_USER = "ElasticoKING";
    const GITHUB_REPO = "ElasticoArts";
    const IMAGES_PATH = "images";

    let foldersData = {};
    let currentFolder = null;
    let currentImages = [];
    let currentImageIndex = 0;

    async function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');

        if (password === CORRECT_PASSWORD) {
            errorMsg.innerText = '';
            const loginLogo = document.getElementById('loginLogo');
            const checkmarkWrapper = document.getElementById('checkmarkWrapper');
            loginLogo.classList.add('rotate');
            setTimeout(() => {
                loginLogo.style.display = 'none';
                checkmarkWrapper.classList.add('active');
            }, 400);
            setTimeout(async () => {
                const loginContainer = document.getElementById('loginContainer');
                loginContainer.classList.add('fade-out');
                setTimeout(async () => {
                    loginContainer.style.display = 'none';
                    window.scrollTo(0, 0);
                    document.getElementById('app').classList.remove('hidden');
                    startMusic();
                    await showFolders();
                }, 500);
            }, 1000);
        } else {
            errorMsg.innerText = 'Falsches Passwort!';
            const input = document.getElementById('passwordInput');
            input.style.borderColor = '#ff6b6b';
            setTimeout(() => { input.style.borderColor = 'rgba(255, 255, 255, 0.2)'; }, 500);
        }
    }

    async function loadImagesFromGitHub() {
        showToast('📸 Lade Galerie...');
        try {
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_PATH}`;
            const response = await fetch(apiUrl);
            if (!response.ok) {
                if (response.status === 404) {
                    showToast('📁 Erstelle einen "images" Ordner auf GitHub!', true);
                    return {};
                }
                throw new Error('Fehler beim Laden');
            }
            const items = await response.json();
            const folders = {};
            for (const item of items) {
                if (item.type === 'dir' && item.name !== '.gitkeep') {
                    const folderName = item.name;
                    const folderUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_PATH}/${folderName}`;
                    const folderResponse = await fetch(folderUrl);
                    const folderItems = await folderResponse.json();
                    const images = [];
                    for (const file of folderItems) {
                        if (file.type === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name)) {
                            const imageUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${IMAGES_PATH}/${folderName}/${file.name}`;
                            images.push(imageUrl);
                        }
                    }
                    if (images.length > 0) folders[folderName] = images;
                }
            }
            return folders;
        } catch (error) {
            console.error('Fehler:', error);
            showToast('❌ Fehler beim Laden der Bilder', true);
            return {};
        }
    }

    async function fetchInstagramFollowers() {
        const el = document.getElementById('instaCount');
        if (!el) return;
        try {
            const res = await fetch('https://instagram-proxy-delta.vercel.app/api/followers');
            const data = await res.json();
            if (data && data.followers) {
                el.textContent = Number(data.followers).toLocaleString('de-CH');
                return;
            }
            throw new Error('no data');
        } catch {
            // Zahl bleibt auf letztem bekanntem Wert
        }
    }

    async function showFolders() {
        currentFolder = null;
        foldersData = await loadImagesFromGitHub();
        const contentArea = document.getElementById('contentArea');
        if (Object.keys(foldersData).length === 0) {
            contentArea.innerHTML = `
                <div class="folders-container">
                    <div class="section-title">🎨 Galerie</div>
                    <div style="text-align: center; padding: 4rem; background: rgba(255,255,255,0.02); border-radius: 2rem; border: 1px dashed rgba(106,17,255,0.3);">
                        <div style="font-size: 5rem; margin-bottom: 1rem;">🎨</div>
                        <h3 style="font-size: 1.5rem;">Willkommen in der ElasticoArts Area</h3>
                        <p style="margin-top: 1rem; color: rgba(255,255,255,0.6);">Bald erscheinen hier exklusive Kunstwerke.</p>
                        <p style="margin-top: 2rem;">
                            <a href="https://www.instagram.com/elasticoarts/" target="_blank" style="color: #6a11ff; text-decoration: none;">📷 Folge mir auf Instagram</a>
                        </p>
                    </div>
                </div>`;
            const storageInfo = document.getElementById('storageInfo');
            if (storageInfo) storageInfo.textContent = `🎨 0 Werke`;
            return;
        }
        let totalImages = 0;
        let html = `<div class="folders-container"><div class="section-title">🎨 Artworks</div><div class="folder-grid">`;
        for (const [folderName, images] of Object.entries(foldersData)) {
            totalImages += images.length;
            html += `
                <div class="folder-card" onclick="openFolder('${folderName.replace(/'/g, "\\'")}')">
                    <div class="folder-icon">📁</div>
                    <div class="folder-name">${escapeHtml(folderName)}</div>
                    <div class="folder-count">${images.length} Werke</div>
                </div>`;
        }
        html += `</div></div>`;
        html += `<div class="insta-card" id="instaCard">
            <div class="insta-icon">📷</div>
            <div class="insta-label">Instagram Followers</div>
            <div class="insta-count" id="instaCount">504</div>
            <div class="insta-username">@ElasticoArts</div>
            <div class="live-badge"><span class="live-dot"></span>Live</div>
        </div>`;
        html += `</div></div>`;
        contentArea.innerHTML = html;
        const storageInfo = document.getElementById('storageInfo');
        if (storageInfo) storageInfo.textContent = `🎨 ${totalImages} Werke`;
        fetchInstagramFollowers();
        setInterval(fetchInstagramFollowers, 30000);
    }

    function toggleLike(event, folder, index) {
        event.stopPropagation();
        try {
            const key = `like_${folder}_${index}`;
            const liked = localStorage.getItem(key) === '1';
            const count = parseInt(localStorage.getItem(key + '_count') || '0');
            const btn = event.currentTarget;
            const countEl = document.getElementById(`lc_${index}`);
            if (liked) {
                localStorage.setItem(key, '0');
                const newCount = Math.max(0, count - 1);
                localStorage.setItem(key + '_count', newCount);
                btn.classList.remove('liked');
                btn.innerHTML = '🤍';
                if (countEl) { countEl.innerHTML = newCount > 0 ? '❤️ ' + newCount : ''; countEl.classList.toggle('has-likes', newCount > 0); }
            } else {
                localStorage.setItem(key, '1');
                const newCount = count + 1;
                localStorage.setItem(key + '_count', newCount);
                btn.classList.add('liked');
                btn.innerHTML = '❤️';
                btn.classList.add('pop');
                setTimeout(() => btn.classList.remove('pop'), 300);
                if (countEl) { countEl.innerHTML = '❤️ ' + newCount; countEl.classList.add('has-likes'); }
            }
        } catch(e) { console.warn('Like error:', e); }
    }

    function openFolder(folderName) {
        currentFolder = folderName;
        currentImages = foldersData[folderName] || [];
        const contentArea = document.getElementById('contentArea');
        let html = `
            <div class="action-bar">
                <button class="back-btn" onclick="showFolders()">← Zurück</button>
            </div>
            <div class="section-title">✨ ${escapeHtml(folderName)}</div>
            <div class="photo-grid">`;
        currentImages.forEach((imgUrl, index) => {
            let liked = false, count = 0;
            try {
                const key = `like_${currentFolder}_${index}`;
                liked = localStorage.getItem(key) === '1';
                count = parseInt(localStorage.getItem(key + '_count') || '0');
            } catch(e) {}
            html += `
                <div class="photo-item" onclick="openLightbox(${index})">
                    <img src="${imgUrl}" alt="Kunstwerk" loading="lazy" onload="this.classList.add('loaded')">
                    <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike(event, '${currentFolder}', ${index})" title="Like">
                        ${liked ? '❤️' : '🤍'}
                    </button>
                    <div class="like-count ${count > 0 ? 'has-likes' : ''}" id="lc_${index}">
                        ${count > 0 ? '❤️ ' + count : ''}
                    </div>
                </div>`;
        });
        html += `</div>`;
        contentArea.innerHTML = html;
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        toast.style.background = isError ? 'rgba(255, 68, 68, 0.9)' : 'rgba(0, 0, 0, 0.9)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function openLightbox(index) {
        currentImageIndex = index;
        const lightbox = document.getElementById('lightbox');
        const sliderImage = document.getElementById('sliderImage');
        const imageCounter = document.getElementById('imageCounter');
        const downloadBtn = document.getElementById('downloadBtn');

        sliderImage.src = currentImages[currentImageIndex];
        imageCounter.innerText = `${currentImageIndex + 1} / ${currentImages.length}`;
        downloadBtn.href = currentImages[currentImageIndex];
        downloadBtn.download = currentImages[currentImageIndex].split('/').pop();
        lightbox.classList.add('active');
        document.addEventListener('keydown', handleKeyPress);

        // Touch Swipe
        let touchStartX = 0;
        let touchEndX = 0;

        lightbox.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        lightbox.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextImage();
                else prevImage();
            }
        }, { passive: true });
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.removeEventListener('keydown', handleKeyPress);
    }

    function nextImage() {
        if (currentImages.length === 0) return;
        currentImageIndex = (currentImageIndex + 1) % currentImages.length;
        updateSliderImage();
    }

    function prevImage() {
        if (currentImages.length === 0) return;
        currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
        updateSliderImage();
    }

    async function downloadImage() {
        const url = currentImages[currentImageIndex];
        const filename = url.split('/').pop();
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);
        } catch (e) {
            window.open(url, '_blank');
        }
    }
    function updateSliderImage() {
        const sliderImage = document.getElementById('sliderImage');
        const imageCounter = document.getElementById('imageCounter');
        const downloadBtn = document.getElementById('downloadBtn');
        sliderImage.src = currentImages[currentImageIndex];
        imageCounter.innerText = `${currentImageIndex + 1} / ${currentImages.length}`;
        downloadBtn.href = currentImages[currentImageIndex];
        downloadBtn.download = currentImages[currentImageIndex].split('/').pop();
    }

    function handleKeyPress(e) {
        if (e.key === 'ArrowLeft') prevImage();
        else if (e.key === 'ArrowRight') nextImage();
        else if (e.key === 'Escape') closeLightbox();
    }

    function logout() {
        const app = document.getElementById('app');
        const loginContainer = document.getElementById('loginContainer');
        app.classList.add('hidden');
        loginContainer.style.display = 'flex';
        loginContainer.classList.remove('fade-out');
        document.getElementById('passwordInput').value = '';
        document.getElementById('errorMsg').innerText = '';
        currentFolder = null;
        const loginLogo = document.getElementById('loginLogo');
        const checkmarkWrapper = document.getElementById('checkmarkWrapper');
        loginLogo.style.display = 'flex';
        loginLogo.classList.remove('rotate');
        checkmarkWrapper.classList.remove('active');
        const musicBtn = document.getElementById('musicBtn');
        if (musicBtn) { musicBtn.textContent = '🎵'; musicBtn.classList.remove('playing'); }
        musicPlaying = false;
    }

    setTimeout(() => {
        const loadingScreen = document.getElementById('loadingScreen');
        loadingScreen.classList.add('fade-out');
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            document.getElementById('loginContainer').style.display = 'flex';
        }, 500);
    }, 1500);

    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });

    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('app').classList.add('hidden');
    document.getElementById('footerYear').textContent = new Date().getFullYear();
</script>
</body>
</html>
