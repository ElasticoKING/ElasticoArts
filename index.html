<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ElasticoArts - Area</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f1f 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* ==================== LOADING SCREEN ==================== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #050510 0%, #0a0a20 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }

        .loading-gif {
            width: 320px;
            height: 320px;
            margin: 0 auto 2rem;
            background-image: url('https://cdn.dribbble.com/userupload/21328517/file/original-48a84740f8b872ce4008dac8b769c6ce.gif');
            background-size: cover;
            background-position: center;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(106, 17, 255, 0.3);
        }

        .loading-dots {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 2rem;
        }

        .loading-dots span {
            width: 14px;
            height: 14px;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }

        .loading-dots span:nth-child(1) { animation-delay: 0s; }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
                background: linear-gradient(135deg, #00b09b, #96c93d);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-text {
            font-size: 1.4rem;
            letter-spacing: 3px;
            font-weight: 500;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 1rem;
        }

        /* ==================== LOGIN SCREEN ==================== */
        .login-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a1a 0%, #0f0f1f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .login-container.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .login-box {
            background: rgba(15, 15, 25, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 3rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(106, 17, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }

        /* Login Logo mit Animation */
        .login-logo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.3s ease;
            position: absolute;
            top: 0;
            left: 0;
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Checkmark Animation */
        .checkmark-wrapper {
            width: 100px;
            height: 100px;
            position: absolute;
            top: 0;
            left: 0;
            transform: scale(0) rotate(-180deg);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .checkmark-wrapper.active {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }

        .checkmark-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 176, 155, 0.5);
        }

        .checkmark {
            width: 50px;
            height: 50px;
            stroke: white;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            animation: drawCheck 0.5s ease-out forwards;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
        }

        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Rotationsanimation für Logo */
        .login-logo.rotate {
            animation: logoRotate 0.5s ease-in-out forwards;
        }

        @keyframes logoRotate {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(0.8);
                opacity: 0.5;
            }
            100% {
                transform: rotate(360deg) scale(0);
                opacity: 0;
            }
        }

        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2rem;
        }

        .login-box input {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .login-box input:focus {
            border-color: #6a11ff;
            transform: scale(1.02);
        }

        .login-box button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(106, 17, 255, 0.3);
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        /* ==================== MAIN APP ==================== */
        .app {
            display: none;
            min-height: 100vh;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header {
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid rgba(106, 17, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            object-fit: cover;
            background: linear-gradient(135deg, #6a11ff, #2575fc);
            padding: 2px;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .instagram-link {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .instagram-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(253, 29, 29, 0.4);
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .storage-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-family: monospace;
            border: 1px solid rgba(106, 17, 255, 0.3);
        }

        .folders-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.8rem;
        }

        .folder-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(106, 17, 255, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .folder-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #6a11ff, #2575fc, #00b09b);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .folder-card:hover::before {
            transform: translateX(0);
        }

        .folder-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(106, 17, 255, 0.5);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .folder-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .folder-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .folder-count {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
        }

        .photo-item {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .photo-item:hover {
            transform: scale(1.03);
            border-color: rgba(106, 17, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .slider-container {
            position: relative;
            width: 90%;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 1rem;
        }

        .nav-btn {
            position: absolute;
            background: rgba(106, 17, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 2rem;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: rgba(106, 17, 255, 0.6);
            transform: scale(1.05);
        }

        .prev-btn { left: -4rem; }
        .next-btn { right: -4rem; }

        .close-lightbox {
            position: absolute;
            top: 1rem;
            right: 2rem;
            background: rgba(106, 17, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .image-counter {
            position: absolute;
            bottom: -3rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            z-index: 4000;
            animation: fadeInOut 2s ease;
            pointer-events: none;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }

        .content-area {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .prev-btn { left: 0.5rem; }
            .next-btn { right: 0.5rem; }
            .nav-btn { width: 2rem; height: 2rem; font-size: 1rem; }
            .loading-gif { width: 240px; height: 240px; }
            .brand { font-size: 1rem; }
            .logo-img { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
    <div class="loader-container">
        <div class="loading-gif"></div>
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="loading-text">ELASTICO ARTS</div>
    </div>
</div>

<!-- LOGIN SCREEN -->
<div class="login-container" id="loginContainer">
    <div class="login-box">
        <div class="login-logo-wrapper">
            <div class="login-logo" id="loginLogo">
                <img src="https://i.imgur.com/NLWduK1.png" alt="ElasticoArts Logo">
            </div>
            <div class="checkmark-wrapper" id="checkmarkWrapper">
                <div class="checkmark-circle">
                    <svg class="checkmark" viewBox="0 0 52 52">
                        <path d="M14 27 L22 35 L38 17" stroke="white" stroke-width="4" fill="none"/>
                    </svg>
                </div>
            </div>
        </div>
        <h1>ElasticoArts Area</h1>
        <p>Exklusive Galerie</p>
        <input type="password" id="passwordInput" placeholder="Passwort">
        <button onclick="checkPassword()">Eintreten</button>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
    <div class="header">
        <div class="logo-area">
            <img class="logo-img" src="https://i.imgur.com/NLWduK1.png" alt="ElasticoArts Logo">
            <span class="brand">ElasticoArts Area</span>
        </div>
        <div class="header-actions">
            <a href="https://www.instagram.com/elasticoarts/" target="_blank" class="instagram-link">
                📷 Instagram
            </a>
            <div class="storage-info" id="storageInfo">📸 wird geladen...</div>
            <button class="logout-btn" onclick="logout()">Verlassen</button>
        </div>
    </div>
    <div class="content-area" id="contentArea"></div>
</div>

<div class="lightbox" id="lightbox">
    <button class="close-lightbox" onclick="closeLightbox()">✕</button>
    <div class="slider-container">
        <button class="nav-btn prev-btn" onclick="prevImage()">❮</button>
        <img class="slider-image" id="sliderImage">
        <button class="nav-btn next-btn" onclick="nextImage()">❯</button>
    </div>
    <div class="image-counter" id="imageCounter"></div>
</div>

<script>
    // ==================== PASSWORT ====================
    const CORRECT_PASSWORD = "amine";
    
    // ==================== GITHUB BILDER ====================
    const GITHUB_USER = "ElasticoKING";
    const GITHUB_REPO = "Artworks---ElasticoArts";
    const IMAGES_PATH = "images";
    
    let foldersData = {};
    let currentFolder = null;
    let currentImages = [];
    let currentImageIndex = 0;
    
    // ==================== LOGIN MIT ANIMATION ====================
    async function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');
        
        if (password === CORRECT_PASSWORD) {
            errorMsg.innerText = '';
            
            // Logo und Checkmark Animation
            const loginLogo = document.getElementById('loginLogo');
            const checkmarkWrapper = document.getElementById('checkmarkWrapper');
            
            // Logo dreht sich und verschwindet
            loginLogo.classList.add('rotate');
            
            // Nach der Drehung den grünen Haken einblenden
            setTimeout(() => {
                loginLogo.style.display = 'none';
                checkmarkWrapper.classList.add('active');
            }, 400);
            
            // Nach der Animation zum Login Fade-out
            setTimeout(async () => {
                const loginContainer = document.getElementById('loginContainer');
                loginContainer.classList.add('fade-out');
                
                setTimeout(async () => {
                    loginContainer.style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    await showFolders();
                }, 500);
            }, 1000);
            
        } else {
            errorMsg.innerText = 'Falsches Passwort!';
            // Kurze Fehler-Animation für das Input-Feld
            const input = document.getElementById('passwordInput');
            input.style.borderColor = '#ff6b6b';
            setTimeout(() => {
                input.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            }, 500);
        }
    }
    
    async function loadImagesFromGitHub() {
        showToast('📸 Lade Galerie...');
        
        try {
            const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_PATH}`;
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                if (response.status === 404) {
                    showToast('📁 Erstelle einen "images" Ordner auf GitHub!', true);
                    return {};
                }
                throw new Error('Fehler beim Laden');
            }
            
            const items = await response.json();
            const folders = {};
            
            for (const item of items) {
                if (item.type === 'dir' && item.name !== '.gitkeep') {
                    const folderName = item.name;
                    const folderUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${IMAGES_PATH}/${folderName}`;
                    const folderResponse = await fetch(folderUrl);
                    const folderItems = await folderResponse.json();
                    
                    const images = [];
                    for (const file of folderItems) {
                        if (file.type === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name)) {
                            const imageUrl = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${IMAGES_PATH}/${folderName}/${file.name}`;
                            images.push(imageUrl);
                        }
                    }
                    
                    if (images.length > 0) {
                        folders[folderName] = images;
                    }
                }
            }
            
            return folders;
        } catch (error) {
            console.error('Fehler:', error);
            showToast('❌ Fehler beim Laden der Bilder', true);
            return {};
        }
    }
    
    async function showFolders() {
        currentFolder = null;
        foldersData = await loadImagesFromGitHub();
        
        const contentArea = document.getElementById('contentArea');
        
        if (Object.keys(foldersData).length === 0) {
            contentArea.innerHTML = `
                <div class="folders-container">
                    <div class="section-title">🎨 Galerie</div>
                    <div style="text-align: center; padding: 4rem; background: rgba(255,255,255,0.02); border-radius: 2rem; border: 1px dashed rgba(106,17,255,0.3);">
                        <div style="font-size: 5rem; margin-bottom: 1rem;">🎨</div>
                        <h3 style="font-size: 1.5rem;">Willkommen in der ElasticoArts Area</h3>
                        <p style="margin-top: 1rem; color: rgba(255,255,255,0.6);">Bald erscheinen hier exklusive Kunstwerke.</p>
                        <p style="margin-top: 2rem;">
                            <a href="https://www.instagram.com/elasticoarts/" target="_blank" style="color: #6a11ff; text-decoration: none;">📷 Folge mir auf Instagram</a>
                        </p>
                    </div>
                </div>
            `;
            
            const storageInfo = document.getElementById('storageInfo');
            if (storageInfo) storageInfo.textContent = `🎨 0 Werke`;
            return;
        }
        
        let totalImages = 0;
        let html = `
            <div class="folders-container">
                <div class="section-title">🎨 Galerie</div>
                <div class="folder-grid">
        `;
        
        for (const [folderName, images] of Object.entries(foldersData)) {
            totalImages += images.length;
            html += `
                <div class="folder-card" onclick="openFolder('${folderName.replace(/'/g, "\\'")}')">
                    <div class="folder-icon">📁</div>
                    <div class="folder-name">${escapeHtml(folderName)}</div>
                    <div class="folder-count">${images.length} Werke</div>
                </div>
            `;
        }
        
        html += `</div></div>`;
        contentArea.innerHTML = html;
        
        const storageInfo = document.getElementById('storageInfo');
        if (storageInfo) storageInfo.textContent = `🎨 ${totalImages} Werke`;
    }
    
    function openFolder(folderName) {
        currentFolder = folderName;
        currentImages = foldersData[folderName] || [];
        
        const contentArea = document.getElementById('contentArea');
        
        let html = `
            <div class="action-bar">
                <button class="back-btn" onclick="showFolders()">← Zurück</button>
            </div>
            <div class="section-title">✨ ${escapeHtml(folderName)}</div>
            <div class="photo-grid">
        `;
        
        currentImages.forEach((imgUrl, index) => {
            html += `
                <div class="photo-item" onclick="openLightbox(${index})">
                    <img src="${imgUrl}" alt="Kunstwerk" loading="lazy">
                </div>
            `;
        });
        
        html += `</div>`;
        contentArea.innerHTML = html;
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        toast.style.background = isError ? 'rgba(255, 68, 68, 0.9)' : 'rgba(0, 0, 0, 0.9)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function openLightbox(index) {
        currentImageIndex = index;
        const lightbox = document.getElementById('lightbox');
        const sliderImage = document.getElementById('sliderImage');
        const imageCounter = document.getElementById('imageCounter');
        
        sliderImage.src = currentImages[currentImageIndex];
        imageCounter.innerText = `${currentImageIndex + 1} / ${currentImages.length}`;
        lightbox.classList.add('active');
        document.addEventListener('keydown', handleKeyPress);
    }
    
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.removeEventListener('keydown', handleKeyPress);
    }
    
    function nextImage() {
        if (currentImages.length === 0) return;
        currentImageIndex = (currentImageIndex + 1) % currentImages.length;
        updateSliderImage();
    }
    
    function prevImage() {
        if (currentImages.length === 0) return;
        currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
        updateSliderImage();
    }
    
    function updateSliderImage() {
        const sliderImage = document.getElementById('sliderImage');
        const imageCounter = document.getElementById('imageCounter');
        sliderImage.src = currentImages[currentImageIndex];
        imageCounter.innerText = `${currentImageIndex + 1} / ${currentImages.length}`;
    }
    
    function handleKeyPress(e) {
        if (e.key === 'ArrowLeft') prevImage();
        else if (e.key === 'ArrowRight') nextImage();
        else if (e.key === 'Escape') closeLightbox();
    }
    
    function logout() {
        const app = document.getElementById('app');
        const loginContainer = document.getElementById('loginContainer');
        
        app.style.display = 'none';
        loginContainer.style.display = 'flex';
        loginContainer.classList.remove('fade-out');
        document.getElementById('passwordInput').value = '';
        document.getElementById('errorMsg').innerText = '';
        currentFolder = null;
        
        // Logo zurücksetzen für nächsten Login
        const loginLogo = document.getElementById('loginLogo');
        const checkmarkWrapper = document.getElementById('checkmarkWrapper');
        loginLogo.style.display = 'flex';
        loginLogo.classList.remove('rotate');
        checkmarkWrapper.classList.remove('active');
    }
    
    // Loading Screen
    setTimeout(() => {
        const loadingScreen = document.getElementById('loadingScreen');
        loadingScreen.classList.add('fade-out');
        
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            document.getElementById('loginContainer').style.display = 'flex';
        }, 500);
    }, 3000);
    
    document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPassword();
    });
    
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('app').style.display = 'none';
</script>
</body>
</html>
